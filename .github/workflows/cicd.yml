name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      # 1. Lấy source code từ GitHub về runner
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2. Chuẩn bị môi trường build Docker nâng cao
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Đăng nhập Docker Hub (sử dụng GitHub Secrets)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Build Docker image của backend và push lên Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/vtit
          file: ./backend/vtit/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/vtit-backend:latest

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      # 5. SSH vào VPS và ra lệnh cập nhật container
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Di chuyển vào thư mục chứa dự án trên VPS của ông
            cd /home/${{ secrets.SERVER_USER }}/app
            
            # Tải image mới nhất vừa build từ Docker Hub về VPS
            docker compose pull
            
            # Khởi động lại hệ thống với image mới (không ảnh hưởng tới volume pgdata)
            docker compose up -d